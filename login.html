<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Asrama</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <div class="login-box">
            <h2>Masuk ke Portal</h2>
            <p>Silakan masukkan akun asrama Anda</p>
            
            <form action="#">
                <div class="input-group">
                    <label for="username">Username atau ID Asrama</label>
                    <input type="text" id="username" placeholder="Masukkan username Anda" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Ingat Saya
                    </label>
                    <a href="#" class="forgot-link">Lupa Kata Sandi?</a>
                </div>
                
                <button type="submit" class="btn-submit">Masuk Sekarang</button>
            </form>

            <div class="login-footer">
                <p>Calon penghuni baru? <a href="#">Daftar di sini</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Pengurus Asrama. All Rights Reserved.</p>
    </footer>

</body>
</html>
